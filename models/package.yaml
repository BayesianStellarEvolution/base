name: BayesianStellarEvolution-Models
category: application
author: Elliot Robinson
maintainer: elliot.robinson@rgoptech.com
copyright: '2019'
# license:
github: BayesianStellarEvolution/BayesianStellarEvolution

default-extensions:
  - OverloadedStrings

dependencies:
  - conduit
  - conduit-extra
  - text
  - vector

library:
  source-dirs: src

  exposed-modules:
    - MainSequenceModel
    - Paths

  dependencies:
    - base >=4.10 && <5
    - attoparsec
    - bytestring
    - containers
    - lzma-conduit

executables:
  testModelFile:
    main: Main.hs
    source-dirs: testModelFile

    dependencies:
      - base
      - BayesianStellarEvolution-Models
      - optparse-applicative
      - containers

tests:
  model-tests:
    main: Spec.hs
    source-dirs: test

    ghc-options:
      - -rtsopts

    dependencies:
      - base
      - BayesianStellarEvolution-Models

      - attoparsec
      - bytestring
      - hspec
      - lzma-conduit
      - QuickCheck
      - raw-strings-qq
